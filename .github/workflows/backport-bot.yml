name: Backport Bot

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]
  push:
    branches:
      - '*.x'
permissions:
  contents: read
jobs:
  backport-issue:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Create Backport Issue
        uses: spring-io/backport-bot@ae3dca6a90774213692f2f49d8826ecfa15e4ade #v0.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
